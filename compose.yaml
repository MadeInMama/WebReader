services:
  webreader:
    image: webreader
    ports:
      - "5167:5167"
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5167
      DbConfig__ConnectionString: Host=host.docker.internal;Port=5432;Database=postgres;Username=postgres;Password=postgres
      MinioConfig__Endpoint: host.docker.internal:9000
      MinioConfig__AccessKey: minioadmin
      MinioConfig__SecretKey: minioadmin
  
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
  
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # MinIO API and Console
      - "9001:9001" # MinIO Browser/Console (if using separate console port)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
  
  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        echo 'Creating default buckets...' &&
        /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin &&
        /usr/bin/mc mb local/mybucket &&
        echo 'Buckets created successfully!'
      "