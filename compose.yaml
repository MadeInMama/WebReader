services:
  webreader:
    image: webreader
    ports:
      - "5167:5167"
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5167
      MinioConfig__AccessKey: minioadmin
      MinioConfig__SecretKey: minioadmin
    env_file:
      - ./.env
    restart: always
    depends_on:
      - db
      - minio
  
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    restart: always
  
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # MinIO API and Console
      - "9001:9001" # MinIO Browser/Console (if using separate console port)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: always

  nginx:
    image: nginx:mainline-alpine-slim
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - minio
      - db
      - webreader
  
  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        echo 'Creating default buckets...' &&
        /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin &&
        /usr/bin/mc mb local/mybucket &&
        echo 'Buckets created successfully!'
      "
