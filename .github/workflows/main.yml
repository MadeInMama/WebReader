name: Deploy Docker

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to run on'
        required: true
        default: "master"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: /${{ secrets.SERVER_USER }}/Projects/deploy.sh

