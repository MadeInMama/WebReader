name: Deploy Docker

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'The branch to run on'
        required: true
        default: "master"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Pulling latest changes from master...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: /${{ secrets.SERVER_USER }}/Projects/deploy_git_reset.sh

      - name: Stopping container...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: /${{ secrets.SERVER_USER }}/Projects/deploy_stop.sh

      - name: "Building and starting new container...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: /${{ secrets.SERVER_USER }}/Projects/deploy_start.sh

      - name: Pruning Docker system...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: /${{ secrets.SERVER_USER }}/Projects/deploy_prune.sh

      - name: Restarting Docker system...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: /${{ secrets.SERVER_USER }}/Projects/deploy_restart.sh

