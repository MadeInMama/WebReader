name: Deploy Docker

on:
  push:
    branches: [ "master" ]
    
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /root/Projects/deploy.sh
          
